<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<meta name="description" content="{{ description }}">
<link rel="canonical" href="{{ canonical | safe }}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ description }}">
<meta property="og:type" content="{{ og_type }}">
<meta property="og:url" content="{{ canonical | safe }}">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="/style.css">
{% if math %}<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]});"></script>
{% endif %}
{% if json_ld %}<script type="application/ld+json">{{ json_ld | safe }}</script>{% endif %}
</head>
<body>
<header class="site-header">
<a href="/">{{ site.title | upper }}</a>
<nav><a href="/about/">ABOUT</a></nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer class="site-footer">&mdash; {{ site.author }} &mdash;</footer>
</body>
</html>
